# gsuid_core Docker Compose 配置
# 部署方式: 本地构建 (挂载模式)

services:
  gsuid_core:
    build:
      context: .
      target: ${GSCORE_BUILD_TARGET:-runtime}
      args:
        - GSCORE_BASE_IMAGE=${GSCORE_BASE_IMAGE:-docker.cnb.cool/gscore-mirror/docker-sync/astral-uv:python3.12-bookworm-slim}
        - GSCORE_PYTHON_INDEX=${GSCORE_PYTHON_INDEX:-https://pypi.org/simple}

    image: gsuid-core:${GSCORE_BUILD_TARGET:-runtime}
    container_name: gsuid_core
    ports:
      - "${PORT:-8765}:8765"
    volumes:
      - ${MOUNT_PATH:-.}:/gsuid_core
      - venv-data:/venv
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONUNBUFFERED=1
      - UV_INDEX=${GSCORE_PYTHON_INDEX:-}
      - UV_NO_CONFIG=${UV_NO_CONFIG:-}
      - http_proxy=${GSCORE_HTTP_PROXY:-}
      - https_proxy=${GSCORE_HTTPS_PROXY:-}
      - no_proxy=${GSCORE_NO_PROXY:-localhost,127.0.0.1,172.0.0.1,astrbot,napcat,.local,cnb.cool,mirrors.aliyun.com,pypi.tuna.tsinghua.edu.cn,mirrors.volces.com}
      - PATH=/root/.nvm/versions/node/v24.14.1/bin:${PATH}
    networks:
      - bot_network

  napcat:
    container_name: napcat
    image: mlikiowa/napcat-docker:v4.17.50
    environment:
      - NAPCAT_UID=1000
      - NAPCAT_GID=root
    ports:
      - 3000:3000
      - 3001:3001
      - 6099:6099
    restart: always
    volumes:
      - ./data/qq:/app/.config/QQ
      - ./data/napcat:/app/napcat/config
    networks:
      - bot_network

  astrbot:
    environment:
      - TZ=Asia/Shanghai
    image: soulter/astrbot:v4.22.0
    container_name: astrbot
    restart: always
    ports:
      - "6185:6185"
      - "6195:6195"
      - "6199:6199"
    volumes:
      - ./data/AstrBot/data:/AstrBot/data
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge

volumes:
  venv-data:
